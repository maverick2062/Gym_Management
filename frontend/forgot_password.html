<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMonk - Recover Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* Glowing orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            z-index: 0;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #818cf8; bottom: -80px; right: -80px; animation-duration: 10s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(20, 22, 32, 0.85);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
            backdrop-filter: blur(16px);
            animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #fff 40%, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        /* Role Tabs */
        .role-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        .role-tabs input[type="radio"] { display: none; }
        .role-tabs label {
            display: block;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 8px 4px;
            border-radius: 7px;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.2s ease;
        }
        .role-tabs input[type="radio"]:checked + label {
            background: #4f46e5;
            color: #fff;
            box-shadow: 0 2px 10px rgba(79,70,229,0.4);
        }

        /* Inputs */
        .input-group { margin-bottom: 1.5rem; }
        .input-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            padding: 11px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: rgba(99,102,241,0.6);
            background: rgba(99,102,241,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .btn-recover {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(79,70,229,0.3);
            transition: all 0.2s;
        }
        .btn-recover:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(79,70,229,0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #818cf8; }

        .success-msg {
            display: none;
            text-align: center;
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div style="text-align:center; margin-bottom: 2rem;">
            <div class="logo-text">Password Recovery</div>
            <p style="color:#6b7280; font-size:0.88rem; margin-top:8px;">
                Enter your details to receive reset instructions.
            </p>
        </div>

        <form id="recoverForm">
            <!-- Role Selector -->
            <div style="margin-bottom: 1.5rem;">
                <div class="role-tabs">
                    <div>
                        <input type="radio" name="userType" id="role-member" value="member" checked>
                        <label for="role-member">Member</label>
                    </div>
                    <div>
                        <input type="radio" name="userType" id="role-employee" value="employee">
                        <label for="role-employee">Employee</label>
                    </div>
                    <div>
                        <input type="radio" name="userType" id="role-admin" value="admin">
                        <label for="role-admin">Admin</label>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="identifier" id="identifierLabel">Email</label>
                <input 
                    type="email" 
                    id="identifier" 
                    class="input-field" 
                    placeholder="you@example.com" 
                    required
                >
            </div>

            <button type="submit" class="btn-recover" id="submitBtn">Send Reset Link</button>
        </form>

        <div id="successMessage" class="success-msg">
            Instructions have been sent to your registered contact. Please check your inbox.
        </div>

        <a href="index.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        const recoverForm    = document.getElementById('recoverForm');
        const identifier     = document.getElementById('identifier');
        const identifierLabel = document.getElementById('identifierLabel');
        const userTypeRadios = document.querySelectorAll('input[name="userType"]');
        const successMessage = document.getElementById('successMessage');
        const submitBtn      = document.getElementById('submitBtn');

        // Logic to toggle between Email and Username based on Role
        userTypeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                const role = e.target.value;
                if (role === 'admin') {
                    identifierLabel.textContent = 'Username';
                    identifier.placeholder = 'admin_username';
                    identifier.type = 'text';
                } else {
                    identifierLabel.textContent = 'Email';
                    identifier.placeholder = 'you@example.com';
                    identifier.type = 'email';
                }
                successMessage.style.display = 'none';
                recoverForm.style.display = 'block';
            });
        });

        recoverForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI Simulation for the recovery request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            // Simulate API call delay
            setTimeout(() => {
                recoverForm.style.display = 'none';
                successMessage.style.display = 'block';
            }, 1500);
        });
    </script>
</body>
</html>
