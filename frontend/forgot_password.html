<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMonk - Recover Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            z-index: 0;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #818cf8; bottom: -80px; right: -80px; animation-duration: 10s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(20, 22, 32, 0.85);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
            backdrop-filter: blur(16px);
            animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #fff 40%, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .role-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        .role-tabs input[type="radio"] { display: none; }
        .role-tabs label {
            display: block;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 8px 4px;
            border-radius: 7px;
            cursor: pointer;
            color: #6b7280;
            transition: all 0.2s ease;
        }
        .role-tabs input[type="radio"]:checked + label {
            background: #4f46e5;
            color: #fff;
            box-shadow: 0 2px 10px rgba(79,70,229,0.4);
        }

        .input-group { margin-bottom: 1.5rem; }
        .input-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            padding: 11px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #f1f5f9;
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }
        .input-field::placeholder { color: #4b5563; }
        .input-field:focus {
            border-color: rgba(99,102,241,0.6);
            background: rgba(99,102,241,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }
        .input-field.error {
            border-color: rgba(239,68,68,0.6);
            background: rgba(239,68,68,0.05);
        }

        .btn-recover {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #fff;
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(79,70,229,0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-recover:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(79,70,229,0.4);
        }
        .btn-recover:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info box — for Employee / Admin */
        .info-box {
            display: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .info-box.warning {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.25);
            color: #fbbf24;
        }

        /* Success message */
        .success-msg {
            display: none;
            text-align: center;
            color: #34d399;
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.2);
            padding: 1.2rem;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        /* Error message */
        .error-msg {
            display: none;
            text-align: center;
            color: #f87171;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 1rem;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-6px); }
            75%       { transform: translateX(6px); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #818cf8; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">

        <div style="text-align:center; margin-bottom: 2rem;">
            <div class="logo-text">Password Recovery</div>
            <p style="color:#6b7280; font-size:0.88rem; margin-top:8px;">
                Enter your details to receive reset instructions.
            </p>
        </div>

        <!-- Role Selector -->
        <div style="margin-bottom: 1.5rem;">
            <div class="role-tabs">
                <div>
                    <input type="radio" name="userType" id="role-member" value="member" checked>
                    <label for="role-member">Member</label>
                </div>
                <div>
                    <input type="radio" name="userType" id="role-employee" value="employee">
                    <label for="role-employee">Employee</label>
                </div>
                <div>
                    <input type="radio" name="userType" id="role-admin" value="admin">
                    <label for="role-admin">Admin</label>
                </div>
            </div>
        </div>

        <!-- Info box for Employee / Admin (shown instead of form) -->
        <div id="infoBox" class="info-box warning">
            <strong>⚠ Cannot self-reset password</strong><br>
            <span id="infoText"></span>
        </div>

        <!-- Member form -->
        <form id="recoverForm" novalidate>
            <div class="input-group">
                <label class="input-label" for="emailInput">Email Address</label>
                <input
                    type="email"
                    id="emailInput"
                    class="input-field"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                >
            </div>

            <!-- Error message -->
            <div id="errorMsg" class="error-msg"></div>

            <button type="submit" class="btn-recover" id="submitBtn">
                <span id="btnText">Send Reset Link</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>

        <!-- Success state (replaces form after submission) -->
        <div id="successMessage" class="success-msg">
            <div style="font-size:2rem; margin-bottom:8px;">📬</div>
            <strong>Check your inbox!</strong><br>
            If that email is registered, a reset link has been sent.<br>
            <span style="font-size:0.8rem; color:#6b7280; margin-top:6px; display:block;">
                Link expires in 1 hour. Check spam if not received.
            </span>
        </div>

        <a href="index.html" class="back-link">← Back to Login</a>

    </div>

    <script>
        // ── Config ────────────────────────────────────────────────
        const API_BASE_URL = 'http://127.0.0.1:5000/api/auth';

        // ── DOM refs ──────────────────────────────────────────────
        const recoverForm  = document.getElementById('recoverForm');
        const emailInput   = document.getElementById('emailInput');
        const submitBtn    = document.getElementById('submitBtn');
        const btnText      = document.getElementById('btnText');
        const btnSpinner   = document.getElementById('btnSpinner');
        const successMsg   = document.getElementById('successMessage');
        const errorMsg     = document.getElementById('errorMsg');
        const infoBox      = document.getElementById('infoBox');
        const infoText     = document.getElementById('infoText');
        const userTypeRadios = document.querySelectorAll('input[name="userType"]');

        // ── Role switcher ──────────────────────────────────────────
        // Employee and Admin cannot self-reset — explain why and hide the form
        const INFO_MESSAGES = {
            employee: 'Employee passwords are managed by your Admin. Please contact your gym administrator to reset your password.',
            admin:    'Admin passwords must be reset manually using the create_admin.py script or by your system administrator.'
        };

        userTypeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                const role = e.target.value;
                clearError();
                successMsg.style.display = 'none';

                if (role === 'member') {
                    // Show form, hide info box
                    recoverForm.style.display = 'block';
                    infoBox.style.display = 'none';
                    emailInput.value = '';
                } else {
                    // Hide form, show info box with explanation
                    recoverForm.style.display = 'none';
                    infoBox.style.display = 'block';
                    infoText.textContent = INFO_MESSAGES[role];
                }
            });
        });

        // ── Form submission — real API call ────────────────────────
        recoverForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const email = emailInput.value.trim();

            if (!email) {
                showError('Please enter your email address.');
                emailInput.classList.add('error');
                emailInput.focus();
                return;
            }

            // Basic email format check
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address.');
                emailInput.classList.add('error');
                emailInput.focus();
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    // Always show success — never reveal if email exists (security)
                    recoverForm.style.display = 'none';
                    successMsg.style.display = 'block';
                } else {
                    showError(data.error || 'Something went wrong. Please try again.');
                }

            } catch (err) {
                console.error('Network error:', err);
                showError('Cannot reach the server. Please check your connection.');
            } finally {
                setLoading(false);
            }
        });

        // Clear error highlight on typing
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('error');
            clearError();
        });

        // ── Helpers ───────────────────────────────────────────────
        function setLoading(on) {
            submitBtn.disabled       = on;
            btnText.style.display    = on ? 'none' : '';
            btnSpinner.style.display = on ? 'block' : 'none';
        }

        function showError(msg) {
            errorMsg.textContent    = msg;
            errorMsg.style.display  = 'block';
            errorMsg.style.animation = 'none';
            void errorMsg.offsetHeight;
            errorMsg.style.animation = '';
        }

        function clearError() {
            errorMsg.style.display = 'none';
        }
    </script>
</body>
</html>
